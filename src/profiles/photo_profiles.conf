# ═══════════════════════════════════════════════════════════════
# photo_profiles.conf — Named Profiles for Photo Encoder
# ═══════════════════════════════════════════════════════════════
# Format: profilename = flags
# Usage:  photo_encoder.sh -i ./input -o ./output --profile instagram
#
# Flags are the same as command-line flags (without -i/-o).
# One profile per line. Lines starting with # are comments.
# ═══════════════════════════════════════════════════════════════

# Social Media
instagram = -f jpeg -p social -r 1080 --crop 1:1 --srgb --strip-exif
facebook = -f jpeg -p social -r 2048 --srgb --strip-exif
twitter = -f jpeg -p social -r 1600 --srgb --strip-exif
whatsapp = -f jpeg -q 70 -r 1600 --max-size 500k --srgb --strip-exif
stories = -f jpeg -p social -r 1080 --crop 9:16 --srgb --strip-exif

# Web
web-gallery = -f avif -p web -r 1920 --srgb
web-thumb = -f avif -p web -r 400 --srgb --suffix "_thumb"
web-4k = -f avif -p web -r 3840 --srgb

# Archive / Backup
archive = -f avif -p archive
archive-full = -f avif -p archive --skip-duplicates
archive-hdr = -f avif -p archive --depth 10

# Print
print-a4 = -f jpeg -p print -r 3508
print-poster = -f jpeg -p print -r 7016

# DJI Camera
dji-web = -f avif -p web -r 1920 --srgb --strip-exif -m
dji-clean = -f jpeg --dji clean
dji-privacy = -f jpeg --dji privacy-strip
dji-archive = -f avif -p archive -m --skip-duplicates

# COCA Tattoo (business)
coca-web = -f avif -p web -r 1920 --srgb --watermark-text "© COCA Tattoo"
coca-social = -f jpeg -p social -r 1080 --crop 1:1 --srgb --watermark-text "COCA Tattoo"
coca-portfolio = -f avif -p archive -r 2560

# Max quality (transparent, no visible loss)
max-avif = -f avif -p max
max-jpeg = -f jpeg -p max

# Quick presets
quick-small = -f jpeg -p web -r 1080 --srgb
quick-medium = -f avif -p web -r 1920
quick-large = -f avif -p archive -r 3840

# Motion Photo shareable (faststart via ffmpeg when available)
motion-share = -f jpeg -p web --motion-shareable
motion-share-only = --motion-only --motion-shareable
